services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - moneymate_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  moneymate_mysql_data:
